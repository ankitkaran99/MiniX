<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniX i18n Plugin Demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f2;
      color: #1f2933;
    }
    button, input { font: inherit; }
    .shell {
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 18px 48px;
      display: grid;
      gap: 18px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-bottom: 12px;
      border-bottom: 1px solid #d9ded4;
    }
    .brand {
      display: grid;
      gap: 4px;
    }
    .eyebrow {
      color: #5a6b45;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    h1, h2, h3, p { margin: 0; }
    h1 {
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1;
      letter-spacing: 0;
      max-width: 780px;
    }
    .subtitle {
      color: #63705c;
      max-width: 620px;
      font-size: 16px;
      line-height: 1.55;
      margin-top: 10px;
    }
    .lang-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid #cdd5c3;
      border-radius: 8px;
      background: #ffffff;
    }
    .lang-switch button {
      min-width: 44px;
      height: 34px;
      border: 0;
      border-radius: 6px;
      color: #42503c;
      background: transparent;
      cursor: pointer;
      font-weight: 700;
    }
    .lang-switch button.active {
      background: #24533d;
      color: #ffffff;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, .8fr);
      gap: 18px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #d9ded4;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(31, 41, 51, .04);
    }
    .hero {
      min-height: 260px;
      display: grid;
      align-content: end;
      gap: 18px;
      background:
        linear-gradient(rgba(21, 47, 37, .16), rgba(21, 47, 37, .12)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1400&q=80");
      background-size: cover;
      background-position: center;
      color: #ffffff;
      border-color: transparent;
      overflow: hidden;
    }
    .hero h2 {
      font-size: clamp(26px, 4vw, 46px);
      line-height: 1.02;
      max-width: 680px;
      text-shadow: 0 2px 16px rgba(0,0,0,.38);
    }
    .hero p {
      max-width: 560px;
      line-height: 1.5;
      text-shadow: 0 2px 12px rgba(0,0,0,.42);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      height: 38px;
      padding: 0 14px;
      border-radius: 6px;
      border: 1px solid #b9c4ad;
      background: #ffffff;
      color: #1f2933;
      cursor: pointer;
      font-weight: 700;
    }
    .btn.primary {
      background: #24533d;
      border-color: #24533d;
      color: #ffffff;
    }
    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .field {
      display: grid;
      gap: 7px;
      margin-top: 16px;
    }
    label {
      color: #516149;
      font-size: 13px;
      font-weight: 800;
    }
    input {
      height: 40px;
      border: 1px solid #cdd5c3;
      border-radius: 6px;
      padding: 0 12px;
      color: #1f2933;
      background: #fbfcfa;
    }
    input:focus {
      outline: 2px solid rgba(36, 83, 61, .18);
      border-color: #24533d;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .stat {
      padding: 12px;
      border: 1px solid #e0e5da;
      border-radius: 8px;
      background: #fbfcfa;
    }
    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      color: #24533d;
      margin-bottom: 6px;
    }
    .stat span {
      color: #63705c;
      font-size: 13px;
    }
    .stack {
      display: grid;
      gap: 12px;
    }
    .list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      border: 1px solid #e0e5da;
      border-radius: 8px;
      background: #fbfcfa;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e9efe4;
      color: #3d5134;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .code {
      overflow: auto;
      padding: 12px;
      border-radius: 8px;
      background: #17211b;
      color: #d7ead2;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 820px) {
      .grid, .stats { grid-template-columns: 1fr; }
      .hero { min-height: 330px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="../mini-x.js"></script>
  <script src="../plugin-i18n.js"></script>
  <script type="module">
    import i18next from "https://cdn.skypack.dev/i18next";
    import FetchBackend from "https://cdn.skypack.dev/i18next-fetch-backend";

    class I18nDemo {
      data() {
        return {
          language: "en",
          guestName: "Ankit",
          seats: 2,
          itinerary: [
            { id: 1, key: "itinerary.arrival", status: "itinerary.statusConfirmed" },
            { id: 2, key: "itinerary.workshop", status: "itinerary.statusOpen" },
            { id: 3, key: "itinerary.dinner", status: "itinerary.statusWaitlist" }
          ]
        };
      }

      created() {
        this.$i18n.ready.then(() => {
          this.language = this.$i18n.language || "en";
        });
      }

      methods = {
        setLanguage(language) {
          this.language = language;
          document.documentElement.lang = language;
          this.$i18n.changeLanguage(language);
        },
        incrementSeats() {
          this.seats += 1;
        },
        decrementSeats() {
          if (this.seats > 1) this.seats -= 1;
        }
      };

      template() {
        return `
          <main class="shell">
            <header class="topbar">
              <div class="brand">
                <div class="eyebrow" x-i18n="app.eyebrow"></div>
                <h1 x-i18n="app.title"></h1>
                <p class="subtitle" x-i18n="app.subtitle"></p>
              </div>

              <div class="lang-switch" role="group" aria-label="Language">
                <button type="button" x-class="{ active: language === 'en' }" @click="setLanguage('en')">EN</button>
                <button type="button" x-class="{ active: language === 'es' }" @click="setLanguage('es')">ES</button>
                <button type="button" x-class="{ active: language === 'hi' }" @click="setLanguage('hi')">HI</button>
              </div>
            </header>

            <section class="panel hero">
              <div>
                <h2>{{ $t('hero.heading', { name: guestName }) }}</h2>
                <p>{{ $t('hero.copy', { count: seats }) }}</p>
              </div>
              <div class="actions">
                <button class="btn primary" x-i18n="hero.primaryAction"></button>
                <button class="btn" x-i18n="hero.secondaryAction"></button>
              </div>
            </section>

            <section class="grid">
              <div class="panel">
                <h2 x-i18n="booking.title"></h2>
                <p class="subtitle">{{ $t('booking.summary', { name: guestName, count: seats }) }}</p>

                <div class="field">
                  <label for="guestName" x-i18n="booking.nameLabel"></label>
                  <input id="guestName" x-model="guestName" x-i18n="[placeholder]booking.namePlaceholder" />
                </div>

                <div class="field">
                  <label x-i18n="booking.seatsLabel"></label>
                  <div class="actions">
                    <button class="btn" @click="decrementSeats" x-disabled="seats <= 1">-</button>
                    <span class="pill">{{ $t('booking.seatsValue', { count: seats }) }}</span>
                    <button class="btn" @click="incrementSeats">+</button>
                  </div>
                </div>

                <div class="stats">
                  <div class="stat">
                    <strong>{{ language.toUpperCase() }}</strong>
                    <span x-i18n="stats.language"></span>
                  </div>
                  <div class="stat">
                    <strong>{{ seats }}</strong>
                    <span x-i18n="stats.seats"></span>
                  </div>
                  <div class="stat">
                    <strong>{{ itinerary.length }}</strong>
                    <span x-i18n="stats.events"></span>
                  </div>
                </div>
              </div>

              <aside class="panel stack">
                <div>
                  <h2 x-i18n="itinerary.title"></h2>
                  <p class="subtitle" x-i18n="itinerary.subtitle"></p>
                </div>

                <div class="list">
                  <template x-for="item in itinerary" :key="item.id">
                    <div class="list-item">
                      <span>{{ $t(item.key) }}</span>
                      <span class="pill">{{ $t(item.status) }}</span>
                    </div>
                  </template>
                </div>
              </aside>
            </section>

            <section class="panel">
              <h2 x-i18n="debug.title"></h2>
              <pre class="code">this.$t('hero.heading', { name: guestName })
=> {{ $t('hero.heading', { name: guestName }) }}

this.$i18n.language
=> {{ $i18n.language }}</pre>
            </section>
          </main>
        `;
      }
    }

    MiniX.createApp(I18nDemo)
      .use(MiniX_i18n({
        i18next,
        fetchBackend: FetchBackend,
        lng: "en",
        fallbackLng: "en",
        ns: ["translation"],
        defaultNS: "translation",
        backend: {
          loadPath: "/demos/locales/{{lng}}/{{ns}}.json"
        },
        debug: true
      }))
      .mount("#app");
  </script>
</body>
</html>
