<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniX Router + Lazy Loader Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }

        .nav {
            display: flex;
            gap: 12px;
            background: #1e293b;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav a.active {
            background: #3b82f6;
            color: white;
        }

        .nav a:hover:not(.active) {
            background: #334155;
            color: #f1f5f9;
        }

        .view-container {
            background: #1e293b;
            border-radius: 24px;
            padding: 24px;
            min-height: 400px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            color: #facc15;
        }

        .card {
            background: #0f172a;
            padding: 16px;
            border-radius: 20px;
            margin-top: 16px;
        }

        .loader-info {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 20px;
            border-top: 1px solid #334155;
            padding-top: 16px;
            text-align: center;
        }

        code {
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 12px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <!-- Include MiniX core and the router (the version with integrated loader) -->
    <script src="../mini-x.js"></script>
    <script src="../plugin-router.js"></script>

    <script>
        class Home {
            view = `
        <div>
          <h2>🏠 Home</h2>
          <p>Welcome to the <strong>lazy‑loading demo</strong>.</p>
          <div class="card">
            <strong>How it works:</strong>
            <ul>
              <li>The <code>Customer</code> and <code>ReportsPage</code> components are <strong>not</strong> loaded upfront.</li>
              <li>When you navigate to <code>/customer</code> or <code>/reports</code>, the router calls <code>loader.load('Customer')</code>.</li>
              <li>The built‑in <code>MiniX_Loader</code> injects a <code>&lt;script&gt;</code> tag, waits for the file to load, and resolves the component.</li>
              <li>After registration, the router renders the component.</li>
            </ul>
          </div>
        </div>
      `;
        }

        // Create router with integrated lazy loader
        const router = MiniXRouter.createRouter({
            // Use hash history for easy file:// testing; switch to createWebHistory() if you have a server
            history: MiniXRouter.createWebHashHistory(),
            debug: true, // see console logs for lazy loading events
            loader: {
                baseDir: './components', // directory where .js component files live
                ext: '.js', // file extension
                retries: 1, // retry once on failure
                timeout: 5000 // 5 seconds timeout
            },
            routes: [{
                path: '/',
                name: 'home',
                component: Home
            },
            {
                path: '/customer',
                name: 'customer',
                component: (load) => load('Customer') // the router passes the `load` function
            },
            {
                path: '/reports',
                name: 'reports',
                component: (load) => load('ReportsPage')
            }
            ]
        });

        // Root application component
        class AppShell {
            view = `
        <div>
          <div class="nav">
            <a x-route="home" x-active="active">Home</a>
            <a x-route="customer" x-active="active">Customer</a>
            <a x-route="reports" x-active="active">Reports</a>
          </div>
          <div class="view-container">
            <div x-router-view></div>
          </div>
          <div class="loader-info">
            🧩 Components are lazy‑loaded when you visit their route for the first time.<br>
            Open the browser console to see load events.
          </div>
        </div>
      `;
        }

        // Mount the app
        const app = MiniX.createApp(AppShell)
            .use(router)
            .mount('#app');
    </script>
</body>

</html>
